<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DOOM — NOCTURNE_OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #050505;
      overflow: hidden;
    }

    #dosbox {
      width: 100%;
      height: 100%;
    }

    .dosbox-container {
      width: 100% !important;
      height: 100% !important;
    }

    /* Stretch canvas to fill the window */
    .dosbox-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <div id="dosbox"></div>

  <script src="https://js-dos.com/cdn/js-dos-api.js"></script>
  <script>
    var dosbox = new Dosbox({
      id: "dosbox",
      onload: function (dosbox) {
        dosbox.run("https://js-dos.com/cdn/upload/DOOM-@evilution.zip", "DOOM/DOOM.EXE");
      },
      onrun: function (dosbox, app) {
        console.log("doom running:", app);
      }
    });
  </script>
</body>
</html>
